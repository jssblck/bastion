name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      # The agent skills bundled in the binary (`bastion skills install`) are
      # committed under `.claude/skills/` and `.agents/skills/`. This fails the
      # build if a change edits a skill's source without re-running the install, so
      # the checked-in copies never drift from `skills/<slug>/SKILL.md`. It builds
      # from the PR's own sources (unlike the agentic `bastion review`, which uses a
      # pinned release): this is a deterministic, content-only lint, not a review.
      - name: Bundled skills are in sync
        run: cargo run --locked --quiet -- skills check

  nudge:
    name: Nudge rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Deterministic, agent-independent enforcement of the mechanical conventions
      # in .nudge.yaml (today: no Unicode dashes in authored text). This is what
      # makes the rules a gate rather than a suggestion to agents: `nudge check`
      # runs the same file rules over the whole tree with no agent in the loop.
      - name: Install Nudge
        run: |
          curl -sSfL https://raw.githubusercontent.com/attunehq/nudge/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Check mechanical conventions
        run: nudge check
