name: bastion

# Bastion reviewing Bastion. On every pull request this downloads a published
# `bastion` release binary and runs `bastion review` over the changeset; a blocked
# review exits non-zero and fails the job. Branch protection on `main` requires the
# `bastion review` check so a blocking gate stops the merge.
#
# The reviewer engine is a *released* binary, not one built from the PR's own
# sources. That is deliberate: building from the PR would let a change edit the
# very engine that judges it (neutering a reviewer or forcing a pass). The job
# always adopts the *latest* published release, so the engine stays outside the
# PR's reach yet picks up improvements with no per-PR pin bump; releases are
# maintainer-cut tags, so the engine is only ever a maintainer-published artifact.
# Reviewer *policy* (.bastion.yaml) is still read from the checkout so
# prompt and trigger changes take effect in the same PR; those paths are
# CODEOWNERS-protected too.
#
# This is the concrete, self-hosted adapter described in docs/developer-guide/github-adapter.md.
# After the review runs, `bastion github report` posts a sticky PR comment carrying
# every reviewer's verdict and findings (optional findings included) plus one check
# run per reviewer and an always-present aggregate `bastion` check. Inline diff
# comments and live mid-run progress are still future. The job's pass/fail remains
# the gate, and the full run is also uploaded as an artifact.

on:
  pull_request:

# Read the diff and fail the job, and write the surfaces `bastion github report`
# posts after the review: the sticky PR comment (`pull-requests: write`) and the
# per-reviewer and aggregate check runs (`checks: write`). `actions: read` lets the
# restore step list and download this branch's prior run artifact.
permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

# One in-flight review per PR; a new push cancels the previous run.
concurrency:
  group: bastion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: bastion review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Whether the optional dedicated app is fully configured. The id and the private
    # key are one credential, so this is true only when both are set: a half-set repo
    # then falls back cleanly instead of running the mint step and failing it. Computed
    # here because the mint step's `if:` can read `env` but not `secrets`.
    env:
      HAS_BASTION_APP: ${{ secrets.BASTION_APP_ID != '' && secrets.BASTION_APP_PRIVATE_KEY != '' }}
    # The Codex (ChatGPT) subscription credentials live in an Actions secret, and
    # GitHub does not share secrets with workflows triggered by fork PRs. We also
    # will not run an agentic backend over untrusted code. So this runs for
    # same-repo PRs only; a maintainer reviews a fork PR by pushing its branch to a
    # trusted branch in this repo.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the base branch resolves for the changeset diff and so
          # the Codex reviewer can run `git diff <base>` over the working tree.
          fetch-depth: 0

      - name: Install the bastion release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          # The latest published release. `gh release view` with no tag uses GitHub's
          # "latest" (most recent non-draft, non-prerelease), so the engine
          # auto-advances but never silently adopts an `-rc` build.
          version="$(gh release view --repo "$repo" --json tagName -q .tagName)"
          echo "Using bastion engine: $version"
          # Expose the resolved version to later steps (e.g. the report step's notice).
          echo "BASTION_ENGINE_VERSION=$version" >> "$GITHUB_ENV"
          asset="bastion-x86_64-unknown-linux-gnu.tar.gz"
          dest="$RUNNER_TEMP/bastion"
          mkdir -p "$dest"
          gh release download "$version" \
            --repo "$repo" \
            --pattern "$asset" \
            --dir "$dest"
          tar -xzf "$dest/$asset" -C "$dest"
          # The archive extracts to a directory named after the asset stem.
          echo "$dest/${asset%.tar.gz}" >> "$GITHUB_PATH"

      - name: Verify bastion
        run: bastion --version

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install the Codex CLI
        run: |
          set -euo pipefail
          npm install -g @openai/codex

      - name: Authenticate Codex as the PR author
        env:
          # Bastion bills each PR's reviews to its author's own ChatGPT subscription
          # through Codex (docs/developer-guide/github-adapter.md, "Authentication &
          # billing"). The author's GitHub login maps to a `CODEX_AUTH_<LOGIN>`
          # secret holding the contents of that person's `~/.codex/auth.json`; Codex
          # refreshes the access token from the stored refresh token at run time.
          # To onboard a contributor, add their secret and a `case` arm below.
          # The mapping lives here, in a CODEOWNERS-protected workflow, so changing
          # who may spend a subscription is itself a reviewed change. An unmapped
          # author fails closed (the gate blocks) rather than silently billing
          # someone else.
          #
          # Bot authors (dependabot[bot]) have no subscription of their own, so
          # their PRs bill to a maintainer who has opted in to sponsor them: a
          # ToS-compliant arrangement where the maintainer governing the bot powers
          # the review of its changes. Note that GitHub serves secrets to
          # Dependabot-triggered runs from the separate *Dependabot* secret store,
          # not the Actions store, so any CODEX_AUTH_<LOGIN> a bot arm references must
          # also be set as a Dependabot secret (gh secret set --app dependabot) or it
          # arrives empty and the gate blocks.
          AUTHOR: ${{ github.event.pull_request.user.login }}
          CODEX_AUTH_JSSBLCK: ${{ secrets.CODEX_AUTH_JSSBLCK }}
        run: |
          set -euo pipefail
          author="$(printf '%s' "$AUTHOR" | tr '[:upper:]' '[:lower:]')"
          # Quote bracketed bot logins; unquoted, case reads [bot] as a glob class.
          case "$author" in
            jssblck) cred="$CODEX_AUTH_JSSBLCK" ;;
            'dependabot[bot]') cred="$CODEX_AUTH_JSSBLCK" ;;
            *)
              echo "::error::No Codex subscription is mapped for PR author '$AUTHOR'. Add a CODEX_AUTH_<LOGIN> secret and a case arm in .github/workflows/bastion.yml." >&2
              exit 1
              ;;
          esac
          if [ -z "$cred" ]; then
            echo "::error::Codex credential for '$AUTHOR' is mapped but its secret is empty; set the matching CODEX_AUTH_<LOGIN> repository secret." >&2
            exit 1
          fi
          mkdir -p "$HOME/.codex"
          printf '%s' "$cred" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Restore prior run history
        # Best effort: bring the most recent prior run of this PR branch into the data
        # directory so reviewers recall the findings they raised on the last push (a fresh
        # Actions runner starts with an empty store, so without this the GitHub
        # prior-findings memory would never see anything). A first push, or an expired
        # artifact, simply restores nothing and reviews with no prior findings.
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass workflow context through the environment instead of interpolating it
          # into the script. A branch name is attacker-controlled and, spliced into the
          # script text, could break out of the quoting and inject shell.
          HEAD_REF: ${{ github.head_ref }}
          RUN_ID: ${{ github.run_id }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p "$WORKSPACE/.bastion/runs"
          # Expected absence (a first push) is non-fatal, but a real failure (auth, API,
          # permissions) is surfaced as a notice rather than silently masquerading as
          # "no prior run" and disabling prior-finding recall.
          if ! prior=$(gh run list --workflow bastion.yml --branch "$HEAD_REF" \
            --json databaseId \
            --jq "map(select(.databaseId != $RUN_ID)) | .[0].databaseId // empty"); then
            echo "::notice::could not list prior runs; reviewing without prior findings"
            prior=
          fi
          if [ -n "$prior" ]; then
            gh run download "$prior" -n bastion-run -D "$WORKSPACE/.bastion/runs" \
              || echo "no prior bastion-run artifact to restore (first run or expired)"
          fi

      - name: Run bastion review
        env:
          # Keep run history inside the workspace so it can be uploaded as an
          # artifact instead of landing in the runner's per-user data directory.
          BASTION_DATA_DIR: ${{ github.workspace }}/.bastion
          # Resolve the `codex` binary npm just put on PATH.
          BASTION_CODEX_BIN: codex
          # Lets the review gather the PR's description and discussion as reviewer
          # context (read-only; best effort, so a failure here never fails the review).
          GITHUB_TOKEN: ${{ github.token }}
          # Workflow context goes through the environment, not the script text, so a
          # branch name cannot inject shell (see the restore step).
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        # Default GitHub bash runs with `-eo pipefail`, so a blocked review's
        # non-zero exit fails the job (and the required check). The human-readable
        # stream goes to the log; the canonical JSONL is persisted under
        # BASTION_DATA_DIR and uploaded below.
        #
        # `--repo`/`--pr` feed the reviewers the PR's stated intent and discussion
        # alongside their prior findings. Some installed release engines do not recognize
        # the context flags, so probe `bastion review --help` for `--repo` (the
        # capability-probe the report step also uses) and pass the flags only when the
        # engine supports them. An engine without them reviews with the diff and prior
        # findings alone.
        run: |
          set -euo pipefail
          # Capture the help text first and match in-shell: a `... | grep -q` pipeline
          # under pipefail can SIGPIPE the producer when grep exits on the first match,
          # which would falsely fail the probe.
          help=$(bastion review --help 2>/dev/null || true)
          ctx=()
          if [[ "$help" == *"--repo"* ]]; then
            ctx+=(--repo "$REPO" --pr "$PR_NUMBER")
          fi
          bastion review --base "origin/$BASE_REF" "${ctx[@]}"

      - name: Mint a dedicated app token for reporting
        id: app-token
        # Optional, and only when a dedicated Bastion GitHub App is configured (the
        # BASTION_APP_ID / BASTION_APP_PRIVATE_KEY secrets). Posting the check runs
        # under a distinct app gives them their own check suite, so the PR renders
        # them under the app's name (e.g. "Bastion / fail-closed-gates"). Without a
        # dedicated app the report step below falls back to the default GITHUB_TOKEN,
        # which still posts but, because every workflow shares the one github-actions
        # app identity, GitHub buckets the API-created check runs into whichever of
        # this commit's check suites it picks (often a sibling workflow like
        # "Security"). The mint runs on `always()` so reporting works even when the
        # review blocked and failed the job above. See docs/developer-guide/github-adapter.md.
        if: ${{ always() && env.HAS_BASTION_APP == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BASTION_APP_ID }}
          private-key: ${{ secrets.BASTION_APP_PRIVATE_KEY }}

      - name: Report the review to the pull request
        # Runs even when the review blocked (and so failed the job above), so the PR
        # always gets the comment and the per-reviewer checks. It reads the run that
        # `bastion review` just persisted under BASTION_DATA_DIR; if no run was
        # recorded (an earlier infrastructure failure) it prints a notice and exits 0
        # rather than piling a second error on top of the real one. Creating check
        # runs needs a GitHub App installation token (a classic PAT cannot); both the
        # minted dedicated-app token and the default GITHUB_TOKEN qualify, so this
        # uses the dedicated-app token when present and falls back to GITHUB_TOKEN
        # otherwise. GITHUB_API_URL is provided by Actions.
        #
        # `github report` landed after v0.1.0, so until a release that includes it
        # becomes the latest, the installed binary will not have the subcommand.
        # When an older engine lacks the subcommand, the report step exits 0, and
        # reporting starts once the latest release includes the command. The
        # capability probe is the only tolerated failure; once the subcommand
        # exists, a real posting error fails the step.
        if: always()
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          BASTION_DATA_DIR: ${{ github.workspace }}/.bastion
        run: |
          set -euo pipefail
          if ! bastion github report --help >/dev/null 2>&1; then
            echo "::notice::bastion engine ${BASTION_ENGINE_VERSION:-unknown} has no 'github report'; skipping PR comment and checks until the latest release includes it."
            exit 0
          fi
          # `bastion github report` reads its own posting identity from the check-run
          # responses, so it decides on its own whether to nudge toward a dedicated
          # app; the workflow does not need to tell it.
          bastion github report \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --sha "${{ github.event.pull_request.head.sha }}"

      - name: Upload the run
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bastion-run
          path: ${{ github.workspace }}/.bastion/runs/**
          # The data dir is dot-prefixed (`.bastion`), so its files are hidden;
          # without this the upload would silently exclude every run and the
          # restore step on the next push would download nothing.
          include-hidden-files: true
          if-no-files-found: warn
