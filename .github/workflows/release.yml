name: Release

# Build and publish Bastion releases to GitHub Releases.
#
# Triggered on version tags (v*). Builds binaries for the supported platform
# matrix in parallel -- native where the runner matches the target, cross-compiled
# otherwise -- then creates a GitHub Release whose notes are generated from the pull
# requests merged since the previous tag (`--generate-notes`, the "releases as
# changelog" pattern). The release is first created as a draft (so its notes are
# generated and every asset is attached to a fully-formed release), then published
# in a final step, so a consumer never sees a partial release.
#
# macOS binaries are shipped unsigned for now. Code signing and notarization need
# an Apple Developer account; wire them in once that exists.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build and package, but do not create a release)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          elif [[ "${{ inputs.dry_run }}" == "true" ]]; then
            # Allow dry runs on any branch using git describe.
            TAG="$(git describe --always --tags)"
            VERSION="${TAG#v}"
            echo "::notice::Dry run on a non-tag ref; using git describe version: $TAG"
          else
            echo "::error::Release must be triggered by a version tag (v*)"
            exit 1
          fi

          # Anything that is not a bare X.Y.Z (pre-release suffix, or a non-semver
          # describe string) is treated as a prerelease.
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PRERELEASE=false
          else
            PRERELEASE=true
          fi

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG} (version ${VERSION}, prerelease ${PRERELEASE})"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    env:
      # Pin the binary's reported `--version` to the release tag so it is correct
      # regardless of clone depth. build.rs honors this override. cargo-cross runs
      # the build directly on the runner (no container), so this env is inherited
      # by every target without extra plumbing.
      BASTION_VERSION: ${{ needs.prepare.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (both architectures cross-compile natively on an Apple runner).
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false

          # Linux glibc. Built on the oldest supported hosted runner (Ubuntu
          # 22.04, glibc 2.35) rather than ubuntu-latest (24.04, glibc 2.39) so
          # the binary's glibc floor is low enough to run on current LTS distros
          # and CI images. A binary links against the build host's glibc, so
          # building on 24.04 would demand GLIBC_2.39 and fail on anything older.
          # For even older systems (RHEL 8, Amazon Linux 2), use the static musl
          # build, which has no glibc dependency at all.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: true

          # Linux musl (static).
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true

          # Windows via cargo-cross (simpler than a native MinGW setup).
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable
          rustup target add ${{ matrix.target }}

      # cargo-cross cross-compiles by downloading the target toolchain and linker
      # onto the runner -- no Docker, unlike cross-rs/cross. Bastion is pure Rust
      # with no C/system dependencies, so a host-side toolchain is all it needs.
      - name: Install cargo-cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cross
          checksum: true

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # Key the cache by the runner image, not just the target. rust-cache's
          # default key folds in runner.os ("Linux") but not the Ubuntu version,
          # so moving a target between images (for example the gnu builds from
          # ubuntu-latest to ubuntu-22.04) would otherwise restore artifacts
          # built against a different glibc. A cached build-script binary linked
          # against glibc 2.39 cannot exec on a 2.35 host, which fails the build.
          shared-key: release-${{ matrix.target }}-${{ matrix.runner }}

      - name: Build (cargo-cross)
        if: matrix.cross
        run: cargo cross build --target ${{ matrix.target }} --package bastion --release --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --target ${{ matrix.target }} --package bastion --release --locked

      - name: Package binary
        id: package
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          ARCHIVE_NAME="bastion-${TARGET}"
          ARCHIVE_DIR="artifacts/${ARCHIVE_NAME}"
          mkdir -p "${ARCHIVE_DIR}"

          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/bastion.exe" "${ARCHIVE_DIR}/"
          else
            cp "target/${TARGET}/release/bastion" "${ARCHIVE_DIR}/"
          fi

          # Ship the license and notices alongside the binary (AGPL).
          cp README.md LICENSE NOTICE "${ARCHIVE_DIR}/"

          (cd artifacts && tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}")
          rm -rf "${ARCHIVE_DIR}"
          echo "archive=artifacts/${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bastion-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: bastion-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum *.tar.gz > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      # Create the release as a draft first so GitHub generates its notes and
      # attaches every asset to a fully-formed release before it is visible.
      - name: Create draft GitHub release
        if: ${{ !inputs.dry_run }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --draft \
            --generate-notes \
            ${{ needs.prepare.outputs.prerelease == 'true' && '--prerelease' || '--latest' }} \
            --title "${{ needs.prepare.outputs.tag }}" \
            artifacts/*.tar.gz \
            artifacts/checksums.txt

      # Flip the fully-built draft to published in one final step, so a consumer
      # never sees a release with missing notes or half its assets.
      - name: Publish GitHub release
        if: ${{ !inputs.dry_run }}
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --draft=false

      - name: Write release summary
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          {
            echo "## Release published: $TAG"
            echo ""
            echo "The release was published with auto-generated notes (the merged PRs since the previous tag)."
            echo ""
            echo "[View the release](https://github.com/${{ github.repository }}/releases/tag/$TAG)"
            echo ""
            echo "### Checksums"
            echo ""
            echo '```'
            cat artifacts/checksums.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          {
            echo "## Dry run - $TAG"
            echo ""
            echo "> [!NOTE]"
            echo "> No release was created. This was a dry run."
            echo ""
            echo "### Artifacts"
            echo ""
            echo '```'
            ls -la artifacts/
            echo '```'
            echo ""
            echo "### Checksums"
            echo ""
            echo '```'
            cat artifacts/checksums.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
