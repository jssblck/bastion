# Bastion reviewer registry.
#
# Reviewers are declarative and static: one concern per reviewer, defined here
# rather than generated by code, so they stay reviewable and produce a stable
# trigger set. Changes to this file should require human review (see
# `bastion codeowners`). The schema is documented in docs/DESIGN.md.
#
# This is an example registry for Bastion's own Rust sources. Adapt it to your
# repository.

reviewers:
  - name: single-responsibility
    trigger: [src/**/*.rs]
    mode: gate
    prompt: |
      Review the changeset to determine whether any one file concentrates too
      many unrelated responsibilities. If a file has clearly taken on multiple
      distinct concerns that should be separate modules, block the PR and name
      the file(s) and the concerns; otherwise approve it.

  - name: error-handling
    trigger: [src/**/*.rs]
    mode: gate
    prompt: |
      Review the changeset for error-handling discipline: no `.unwrap()` or
      `.expect()` on recoverable errors in non-test code, errors propagated with
      `?` and given context, and gates that fail closed. Block the PR if you find
      a recoverable error that can panic in production; otherwise approve it.

  - name: test-coverage
    trigger: [src/**/*.rs]
    mode: advisor
    prompt: |
      Check whether new or changed behavior in this changeset is covered by
      tests. This is advisory: report uncovered behavior as optional findings so
      the author can decide, but do not block.

  - name: docs-in-sync
    trigger: [src/**/*.rs, docs/**/*.md, "bastion/reviewers.yaml"]
    mode: advisor
    prompt: |
      The local CLI surface (docs/LOCAL.md) and the GitHub adapter (docs/GITHUB.md)
      are meant to be mirror images, and the reviewer schema lives in
      docs/DESIGN.md. If this changeset alters a user-visible command, the verdict
      or event schema, or the reviewer schema without updating the relevant docs,
      report it as an optional finding.
