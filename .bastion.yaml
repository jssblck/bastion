# Bastion reviewer registry.
#
# Reviewers are declarative and static: one concern per reviewer, defined here
# rather than generated by code, so they stay reviewable and produce a stable
# trigger set. Changes to this file should require human review (see
# `bastion github codeowners`). The schema is documented in
# docs/developer-guide/design.md (and, task-first, docs/user-guide/authoring-reviewers.md).
#
# This file lives at the repository root as `.bastion.yaml` (the `.bastion.yml`
# spelling is also honored). This is the live registry Bastion uses to review its
# own changes, both in the local loop (`bastion review`) and in CI
# (`.github/workflows/bastion.yml`). Every
# reviewer runs on the Codex backend, billed to the maintainer's subscription; see
# the authentication notes in docs/developer-guide/github-adapter.md. Adapt it to your repository.

reviewers:
  - name: single-responsibility
    trigger: [src/**/*.rs]
    mode: gate
    backend: codex
    prompt: |
      Review the changeset to determine whether any one file concentrates too
      many unrelated responsibilities. If a file has clearly taken on multiple
      distinct concerns that should be separate modules, block the PR and name
      the file(s) and the concerns; otherwise approve it. A single large but
      cohesive module (everything in it serving one concern) is not a violation.

  - name: error-handling
    trigger: [src/**/*.rs]
    mode: gate
    backend: codex
    prompt: |
      Review the changeset for error-handling discipline: no `.unwrap()` or
      `.expect()` on recoverable errors in non-test code, errors propagated with
      `?` and given context, and gates that fail closed. Block the PR if you find
      a recoverable error that can panic in production; otherwise approve it.
      Panics in `#[cfg(test)]` code and in genuinely-unreachable invariants that
      are documented as such are acceptable.

  - name: fail-closed-gates
    trigger: [src/**/*.rs]
    mode: gate
    backend: codex
    prompt: |
      Bastion's core safety invariant is that gates fail closed, advisors fail
      open, and every verdict is internally consistent. That invariant is
      established where a verdict is PRODUCED LIVE during a review: the backends
      that parse a reviewer's output, the runner that applies fail-closed (gate)
      and fail-open (advisor) policy to each result, and the aggregation that folds
      the resolved rows into the one merge decision the runner persists. That live
      path is the trust boundary, and it is the scope of this reviewer.

      Review only changes to that live-decision path. Block the PR if any of these
      could happen there:

      - A gate (or the aggregate `bastion` gate) is allowed to pass when it cannot
        produce a valid, consistent verdict: a missing, errored, timed-out, or
        crashed reviewer counted as a pass instead of resolving to a block.
      - An inconsistent verdict is trusted rather than rejected where it is
        produced: a `pass` that carries blocking findings, or a `block` with no
        blocking finding.
      - An advisor is allowed to block, or a gate is allowed to fail open.

      Bastion's threat model is aligned contributors, not a forged run file (see
      docs/user-guide/governance.md, "It is not an adversarial security boundary").
      So a surface that REPLAYS or RENDERS a run the runner already decided and
      persisted (for example `bastion github report` or the read-back commands)
      is trusted to reflect that recorded run, and is out of scope here. Do NOT
      require such a surface to re-derive the merge decision from the raw rows, nor
      to prove a persisted run structurally complete, correctly ordered,
      single-sourced, or tally-consistent before it renders the recorded outcome:
      treating the persisted run as untrusted input is explicitly not the model,
      and a missing or extra row in a replayed stream is a runner bug to catch on
      the live path above, not a case a renderer must defend against. The one thing
      a rendering surface must still not do is launder a recorded block, or a
      self-contradictory recorded verdict (a `pass` carrying a blocking finding),
      into a green result, since that is honoring the recorded gate rather than
      re-validating the file.

      Approve when every failure path on the live-decision path resolves to a
      block, advisors never gate, and any rendering surface faithfully reflects the
      recorded decision without turning a block into a pass.

  - name: parse-dont-validate
    trigger: [src/**/*.rs]
    mode: advisor
    backend: codex
    prompt: |
      This repo follows parse-don't-validate: data crossing a boundary (config
      files, CLI arguments, git output, subprocess output, agent responses) should
      be parsed once into a precise type -- a newtype or enum that makes invalid
      states unrepresentable -- rather than carried around stringly-typed and
      re-checked at each use. As an advisor, report as optional findings any new
      boundary that validates-then-passes-through raw strings or integers where a
      parsed type would remove a class of bugs, or any code that re-validates data
      that was already parsed upstream. Do not block.

  - name: test-coverage
    trigger: [src/**/*.rs]
    mode: advisor
    backend: codex
    prompt: |
      Check whether new or changed behavior in this changeset is covered by
      tests. This is advisory: report uncovered behavior as optional findings so
      the author can decide, but do not block.

  - name: public-api-docs
    trigger: [src/**/*.rs]
    mode: advisor
    backend: codex
    prompt: |
      This crate sets `#![warn(missing_docs)]` and documents fallible public
      functions with a `# Errors` section. As an advisor, check that new or
      changed public items (modules, types, struct fields, functions, trait
      methods) carry a doc comment, and that public functions returning `Result`
      describe their failure conditions under a `# Errors` heading. Report gaps as
      optional findings; do not block.

  - name: release-surface-robustness
    trigger:
      [
        scripts/**,
        ".github/workflows/release.yml",
        ".github/workflows/installers.yml",
      ]
    mode: gate
    backend: codex
    prompt: |
      Review changes to the public install and release path -- the install
      scripts and the release/installer workflows -- for robustness. Block the PR
      if any of the following hold; otherwise approve it.

      - An installer downloads a release artifact without verifying its SHA-256
        checksum, or treats a missing, unparseable, or mismatched checksum as
        anything other than a hard failure. Checksum problems must fail closed,
        never warn and continue.
      - Resolving the latest release (or any release metadata) depends on a
        rate-limited, unauthenticated endpoint that fails from shared IPs and CI
        runners -- notably api.github.com, which 403s at 60 requests/hour/IP --
        when a non-rate-limited path exists (the github.com /releases/latest
        redirect resolves the tag without the API).
      - The bash installer (scripts/install.sh) and the PowerShell installer
        (scripts/install.ps1) have drifted out of sync in their options, archive
        names, default install locations, or fail-closed behavior; or either
        installer's archive names and platform targets disagree with what the
        release workflow's build matrix actually produces.

  - name: shell-script-footguns
    trigger: [scripts/**, ".github/workflows/**"]
    mode: advisor
    backend: codex
    prompt: |
      As an advisor, review shell and PowerShell code -- standalone scripts under
      scripts/ and inline `run:` steps in workflows -- for portability footguns
      that tend to fail silently or only in CI. Report these as optional findings;
      do not block.

      - bash that does not run under `set -euo pipefail`, or unquoted variable
        expansions that break on spaces or globbing.
      - PowerShell that captures a command's output by assignment or `| Out-String`
        while the producing code emits via `Write-Host`. `Write-Host` writes to the
        information stream, which success-stream capture misses, so the variable
        ends up empty; the fix is `Write-Output`/`return` or an explicit `6>&1`
        redirect when capturing.
      - Reliance on interactive-only behavior (prompts, paging, a TTY) in a
        non-interactive CI shell.

  - name: embedded-asset-line-endings
    trigger: [skills/**, src/skills.rs, .gitattributes]
    mode: gate
    backend: codex
    prompt: |
      Bastion embeds text assets into the binary with `include_str!` (the bundled
      skills under skills/<slug>/SKILL.md) and then compares an installed copy
      against the embedded source byte for byte to drive the `bastion skills check`
      drift guard. Line endings are the footgun: git's `core.autocrlf` checks these
      assets out as CRLF on Windows, so an embedded asset that is parsed by exact
      bytes, or a byte-for-byte comparison that does not normalize newlines, breaks
      on Windows while passing in Linux CI. You are running in the repository, so
      inspect the changed assets, the embedding/compare code, and .gitattributes
      directly.

      This is a gate. Block the PR if any of the following is definitely true for
      the change; otherwise approve it. When you cannot confirm a problem, approve.

      - A newly embedded text asset (a new `include_str!` of a file under skills/
        or similar) whose exact bytes are parsed or compared has no LF pin: there
        is no matching `text eol=lf` entry in .gitattributes covering it, AND the
        code does not normalize CRLF to LF before parsing or comparing. At least
        one of the two defenses must be present.
      - A `.gitattributes` change removes or weakens the `eol=lf` pin on an
        embedded, byte-compared asset (for example deleting the skills/**/SKILL.md
        rule or broadening it back to a native-eol default).
      - A byte-for-byte equality check against embedded asset content (the install
        idempotence check or the drift `check`) is introduced or changed so that it
        compares raw bytes without normalizing newlines, which would report a CRLF
        checkout of identical content as drift.

      Judge only line-ending stability of embedded, byte-compared assets. Ordinary
      source edits, prose-only asset wording changes, or comparisons that already
      normalize newlines are not violations, so approve them.

  - name: user-guide-integrity
    trigger: [docs/user-guide/**]
    mode: gate
    backend: codex
    prompt: |
      The user guide under docs/user-guide is single-sourced: the same markdown
      is published at bastion.jessica.black/guide, where the site build sorts and
      routes chapters by their frontmatter and rewrites their relative `.md`
      links to `/guide/*` routes (links that leave the guide are rewritten to
      GitHub URLs). A change that is fine to read on GitHub can therefore break
      the published site. You are running in the repository, so inspect the
      actual files under docs/user-guide and the link targets directly.

      Block the PR if any of the following is definitely true for a changed file;
      otherwise approve it. When you cannot confirm a problem, approve.

      - A chapter is missing required frontmatter: every file must have a YAML
        frontmatter block with `title` (string), `summary` (string), and `order`
        (number). A new chapter without it will not render.
      - Two chapters share the same `order` value (the site sorts by it, so a
        collision makes navigation order undefined).
      - An in-guide relative link (e.g. `./concepts.md` or
        `./concepts.md#a-heading`) points to a docs/user-guide file that does not
        exist, or to a `#heading` anchor that does not exist in the target
        chapter. Once rewritten to a `/guide` route it would 404.
      - A relative link that leaves the guide (e.g. `../developer-guide/x.md`,
        `../../.bastion.yaml`) resolves to a repository path that does
        not exist. The build turns these into GitHub links, so a dead path is a
        dead link.

  - name: user-docs-in-sync
    trigger: [src/**/*.rs, docs/user-guide/**]
    mode: gate
    backend: codex
    prompt: |
      The user guide under docs/user-guide is the end-user documentation for
      Bastion: it describes the CLI a user runs and the policy they author --
      commands and subcommands, their flags and defaults, exit-code semantics,
      the reviewer/registry schema, configuration, and example JSONL event/verdict
      output. It must stay truthful about how the shipped tool behaves. You are
      running in the repository, so read the relevant user-guide chapters and the
      changed code directly.

      This is a gate. Block the PR if either of the following holds; otherwise
      approve it.

      - CONTRADICTION: this change alters user-visible behavior (a command or
        subcommand, a flag or its default, an exit code, the reviewer/registry
        schema, a configuration key, or an event/verdict field a user reads) in a
        way that makes an existing statement or example in docs/user-guide now
        wrong, and that documentation was not updated to match.
      - OMISSION: this change adds new user-visible behavior of those same kinds
        (a new command, subcommand, flag, config key, exit code, or event/verdict
        field a user would invoke or observe) and the user guide was not updated
        to document it.

      Judge only the USER-visible surface. A purely internal change -- refactoring,
      renaming private items, performance work, anything a user cannot observe from
      the CLI, its output, or the files they author -- does not require a
      user-guide update, so approve it. When the change is user-visible and the
      matching docs were updated (or already cover it), approve. When you block,
      name the exact command, flag, or field and the chapter that must change.

  - name: contributor-docs-in-sync
    trigger:
      [src/**/*.rs, build.rs, docs/developer-guide/**, AGENTS.md, CONTRIBUTING.md]
    mode: gate
    backend: codex
    prompt: |
      The contributor documentation -- docs/developer-guide/ (architecture, the
      backend boundary, conventions, and the design references), AGENTS.md, and
      CONTRIBUTING.md -- describes how Bastion is built for people working ON it:
      the module map and the life of a review, the Backend trait and the
      subprocess seam, the data/store layout, the verdict/event schema, version
      derivation and the build flow, and the release runbook. It must stay
      truthful about the actual code and process. You are running in the
      repository, so read the relevant developer-guide sections (and AGENTS.md /
      CONTRIBUTING.md) and the changed code directly.

      This is a gate. Block the PR if either of the following holds; otherwise
      approve it.

      - CONTRADICTION: this change alters something the contributor docs describe
        -- the module/architecture map, the backend boundary or dispatch, the
        runner, the data-directory/store layout, the verdict/event schema, the
        version-derivation or build flow, or a stated convention -- in a way that
        makes an existing statement in docs/developer-guide, AGENTS.md, or
        CONTRIBUTING.md now wrong, and that documentation was not updated to match.
      - OMISSION: this change adds a new architectural element those docs are
        meant to cover (a new module or subsystem, a new backend, a new CLI
        surface in the architecture map, a new persisted artifact, a changed
        build or release step) and the contributor docs were not updated to
        describe it.

      Judge against what the contributor docs actually claim. A change that does
      not touch anything they describe -- an internal edit fully contained within
      an already-documented module, a test-only change, a typo fix -- does not
      require a docs update, so approve it. When the relevant docs were updated
      (or already cover the change), approve. When you block, name the exact code
      element and the doc section that must change.

  # Prose voice. Keeps first-party copy free of AI-register "slop": the marketing
  # site, the guides, the developer docs, and the top-level project markdown. The
  # tells are structural, not lexical, so the prompt spells them out and the
  # reviewer is self-contained on any backend. The companion `stop-slop` skill
  # (.claude/skills/stop-slop) holds the full reference and before/after examples;
  # the prompt below is self-contained, so it works without that skill loaded. Once
  # the `skills` capability is provisioned, this reviewer can opt into `stop-slop`
  # to load that reference into the agent's context (see
  # docs/developer-guide/design.md). A gate: prose voice is a judgment call, but
  # this project treats slop in user-facing prose as a merge blocker, biased toward
  # catching it since a false block is cheap to override.
  #
  # The trigger covers first-party authored markdown (the roots are enumerated
  # because trigger globs are OR-combined with no negation). For skills, only the
  # bundled source under skills/** is reviewed: that is what `bastion skills install`
  # ships into a consuming repo. The top-level skill dirs (.agents/skills/** and
  # .claude/skills/**, kept as exact mirrors; see tests/skills_mirror.rs) are not
  # reviewed: they hold installed copies and vendored upstream trees this project
  # does not police.
  - name: prose-anti-slop
    trigger:
      [
        site/src/**/*.astro,
        docs/**/*.md,
        site/**/*.md,
        skills/**/*.md,
        ".github/**/*.md",
        README.md,
        CONTRIBUTING.md,
        SECURITY.md,
        CODE_OF_CONDUCT.md,
        AGENTS.md,
        CLAUDE.md,
      ]
    mode: gate
    backend: codex
    prompt: |
      As a gate, review only the user-facing PROSE in the changed files for
      AI-register "slop": the structural tics that make copy read as machine-
      written. The tells are structural, not vocabulary, so do not just hunt for
      buzzwords.

      Decision:

      - If the changed prose carries one or more slop tells from the list below,
        return verdict: block. Enumerate EVERY instance across all changed prose in
        this single pass: emit one blocking finding per instance, each naming the
        file, the line or sentence, which tell it is, and a shorter rewrite that
        keeps every fact. Do not stop after the first tell or once you have enough
        to block. A partial list costs the author another full review cycle per
        remaining tell, so scan every changed prose file and report the complete
        set before you finish.
      - If the changed prose is clean, return verdict: pass.
      - Bias toward catching slop. A missed tell is worse than a false block: a
        false block is cheap to override, but slop that merges becomes the house
        style. Still respect the discipline below so the gate stays signal, not
        noise: flag slop, not every stylistic choice.

      Flag these:

      - Virtue or character framing: prose that asserts the product is honest,
        trustworthy, principled, humble, or "knows its edges" instead of stating
        what it does. State the mechanism and let it speak.
      - Manufactured antithesis ("X, not Y") where the second half is a strawman
        or a vibe rather than a real, distinct, true alternative. Cut those. KEEP
        contrasts where both halves name real opposed behaviors: in this repo
        "gates block, advisors comment" and "gates fail closed, advisors fail
        open" are real and must stay.
      - Aphorism openers or closers: a section that opens or closes on a tidy
        maxim ("attention is scarce...", "the more you ask, the less it catches").
        Cut the maxim; the surrounding fact already carries it.
      - Triadic parallelism and rule-of-three cadence used for rhythm rather than
        because there are exactly three real, distinct items.
      - The dramatic colon: setup then payoff staged for suspense ("runs locally,
        end to end: capture to definition").
      - Uniform clipped-fragment headers (every header a short declarative with a
        terminal period). Suggest varying them; some can be plain noun phrases.
      - The meta-pattern: every sentence doing rhetorical work. Real copy is
        lumpier and lets some sentences be flat and informational.
      - Em dashes or en dashes, and the literal "--" used as a dash, in prose:
        this project writes plain ASCII, so recast with a comma, a colon, or
        parentheses. Ignore "--flag" forms inside commands and code.

      Discipline:

      - Touch only prose. Leave code blocks, YAML, CLI examples, command flags,
        tables, and quoted or third-party material exactly as they are.
      - Do not over-correct. Flat, fragment-phobic, antithesis-phobic prose is its
        own tell; one beat of personality per section is fine. Block slop, not
        every stylistic choice.
      - Apply the test: if a fact survives the rewrite and the copy got shorter,
        the cut was slop. If a rewrite would drop information, do not suggest it.
      - If the `stop-slop` skill is available in your context, use it for the full
        reference and the before/after examples.

  # Documentation as a snapshot. The guides under docs/ are reference material for
  # one release, not a changelog or a roadmap: a reader on any version should see the
  # tool described as it is. Two defects break that. (1) Temporal framing of current
  # behavior: "X now ships", "currently", "recently added", floating "today", which
  # reads as wrong the moment a later release lands; the fix is plain present tense.
  # (2) Speculative future features: prose describing things that do not exist (a
  # packaged action, a GitHub App, live progress, a planned rendering, a marketplace,
  # anything labeled "forward-looking" or "the target shape"); the fix is to DELETE
  # it, not soften it, because a doc should not advertise what was never built. The
  # one legitimate forward-reference is a "not implemented / fails closed" note for a
  # CONFIG or SCHEMA surface a reader can actually set but that does not work yet (the
  # `pi` backend, the `mcp` and `skills` capabilities, network scoping): the config
  # implies behavior that silently does not happen, so the note keeps a user from
  # being burned. A gate, like the prose-voice one above: a false block is cheap to
  # override, and both defects are recurring, mechanical tells.
  - name: docs-as-snapshot
    trigger: [docs/**/*.md]
    mode: gate
    backend: codex
    prompt: |
      As a gate, review the changed documentation prose so that it reads as a
      snapshot of the shipped release: it describes the tool as it is, does not
      narrate functionality against a moving present, and does not advertise features
      that do not exist. Documentation is reference material read on a specific
      version. You are running in the repository, so you can check whether something
      a doc describes actually exists in the code.

      Decision:

      - If the changed prose has one or more of the defects below, return verdict:
        block. Enumerate EVERY instance across all changed docs in this single pass:
        emit one blocking finding per instance, each naming the file, the line or
        sentence, which defect it is, and the fix (a present-tense rewrite, or a
        deletion). Do not stop after the first one.
      - If the changed prose is clean, return verdict: pass.
      - Bias toward catching it: a false block is cheap to override. Still keep the
        gate signal, not noise, by respecting the "do not flag" list below.

      Defect 1, temporal framing of current behavior. Flag wording that dates a
      statement about what Bastion does against an unstated clock, and rewrite it in
      plain present tense:

      - Moving-present verbs: "X now ships / now posts / now does / now supports",
        "is now", "as of today", "these days", "nowadays".
      - Recency or novelty: "recently", "newly", "just added / just landed / just
        shipped", "the latest addition".
      - Floating "today" / "currently" meaning "in this version" while describing
        behavior ("currently resolves to", "today it posts").
      - Change-tracking headers that bake the clock into the structure ("What ships
        today", "Shipped today").

      Defect 2, speculative future features. Flag prose that describes functionality
      that does not exist in this release as if it were designed, coming, or the
      intended shape, and say to REMOVE it (do not soften it to present tense, since
      the feature is not real):

      - A named artifact that is not shipped (for example a packaged GitHub Action, a
        GitHub App, a `review-action`), including example code that uses it.
      - A described behavior that the code does not do: live progress, spinners, a
        live-updating aggregate table, inline diff review comments, a rendering or
        layout marked "target" / "forward-looking" / "when it lands" / "would".
      - A roadmap or "future" list of features that might be built later.

      The one allowed exception (do NOT flag): a short "not implemented" or "fails
      closed" note tied to a CONFIG or SCHEMA surface a reader can set but that does
      not work, so the note prevents a surprise. The `pi` backend ("named but not
      wired; selecting it fails closed"), the `mcp` and `skills` capabilities ("not
      provisioned; declaring one fails closed"), and network scoping ("`network:
      true` is honored but unscoped") are the standing cases. State these in present
      tense; do not pad them into a roadmap.

      Also do NOT flag:

      - Temporal words that are not about Bastion's feature evolution: "the latest
        run", "recent runs", "what ran recently" (the run index), the changeset
        definition (uncommitted/untracked edits), tutorial narration to the reader
        ("you now have a working reviewer"), dates in frontmatter, and general
        statements about the world or industry rather than the product.
      - Honest present-tense scope or non-goal statements ("the adapter does not
        integrate with merge queues", "out of scope for the current design") that
        state a boundary without promising future work.
      - Anything inside code blocks, YAML, CLI examples, command flags, reviewer-
        prompt example text, quoted error strings, or other quoted or third-party
        material. Touch only prose.

      When you block, name the file and the exact phrase, and give the fix. When the
      changed prose reads as a clean snapshot of the release, approve.

  # Table markup. A header-plus-rows tabular view must share one set of column
  # tracks (a real <table>, or one grid container whose rows are subgrids or use
  # display:contents), never a separate CSS grid per row. Independent per-row
  # grids recompute their tracks from each row's own content, so a wider cell in
  # one row (a badge, a longer label) silently shifts that row's later columns
  # out of alignment with the rows above. This is a gate because column drift is
  # a visible rendering bug and the structural fix is mechanical.
  - name: table-column-alignment
    trigger: [site/src/**/*.astro]
    mode: gate
    backend: codex
    prompt: |
      As a gate, review changed Astro components for tabular, column-aligned
      views built as a separate CSS grid per row instead of as one table. A
      tabular view here means a column header row plus repeating data rows whose
      cells are meant to line up into shared columns (a registry, a ledger, a
      results grid).

      The bug this catches: when the header and each row are their own element,
      each with its own `display: grid; grid-template-columns: ...`, the column
      tracks are recomputed per row from that row's own content. Any
      content-sized (`auto`) or flexible (`fr`) track then resolves to a
      different width on a row whose content is wider (a badge, a longer label),
      so that row's later columns drift out of alignment with the rows above it.
      A real table, or one grid container the header and rows share, computes the
      tracks once, so the columns cannot drift.

      Block the PR if a changed file introduces or keeps a tabular,
      column-aligned view whose header and data rows each declare their own
      `grid-template-columns`, rather than one of:

        - a real `<table>` (`thead`/`tbody`/`tfoot`) with one set of column
          widths (for example via a `<colgroup>`), or
        - a single grid container whose header and rows are subgrids or use
          `display: contents`, so every row resolves against the same tracks.

      When you block, name the file, the header and row classes, and which of the
      two approaches fits.

      Otherwise approve. Do not block these:

        - Non-tabular layouts: page and section grids, two-up card layouts, a
          connector between panels, anything where sibling rows are not meant to
          share columns.
        - Independent cards or list items that use grid internally but do not
          need to align column-for-column with their siblings.
        - A per-row grid whose every track is a fixed length (no `auto`, no
          `fr`): fixed tracks resolve identically on every row, so they cannot
          drift. A shared table is still cleaner, but this is not a block.
        - Markdown tables and any existing `<table>`, which already share tracks.

  # Deploy trigger coverage. The site is single-sourced: the Astro content
  # collection in site/src/content.config.ts globs markdown from outside site/
  # (today ../docs/user-guide), so the built site depends on files the "Deploy
  # site" workflow does not sit next to. If that workflow's push `paths:` filter
  # does not list every directory the build reads, a docs-only change merges
  # without redeploying and the published site silently goes stale. This is a
  # gate because a stale deploy is a real, user-visible regression and the fix
  # (widen the filter) is mechanical.
  - name: deploy-trigger-coverage
    trigger: [".github/workflows/site.yml", "site/src/content.config.ts"]
    mode: gate
    backend: codex
    prompt: |
      The marketing site in site/ is single-sourced: site/src/content.config.ts
      loads guide content with a glob whose `base` points outside site/ (today
      ../docs/user-guide). The "Deploy site" workflow (.github/workflows/site.yml)
      only redeploys on a push that matches its `paths:` filter, so every external
      directory the content config reads must appear in that filter, or a change to
      those files merges without redeploying and the live site goes stale. You are
      running in the repository, so read both files directly.

      This is a gate. Block the PR if the following is definitely true for the
      change; otherwise approve it. When you cannot confirm a problem, approve.

      - After this change, site/src/content.config.ts globs content from a
        directory outside site/ (a `base` that escapes site/, for example
        ../docs/...) that is NOT covered by the push `paths:` filter in
        .github/workflows/site.yml, AND that filter is restrictive (it declares
        `paths:` at all rather than matching every push to the branch). A glob
        base that stays under site/ is already covered by the existing `site/**`
        entry, so it is not a violation.

      When you block, name the content-collection base directory that is read and
      the `paths:` entry that must be added to cover it. Judge only deploy-trigger
      coverage for the site build. Unrelated workflow edits, or content-config
      changes that stay within already-covered directories, are not violations, so
      approve them.

  # Open Graph card sync. The social-preview image at site/public/og.png is not
  # authored by hand: site/scripts/og-gen.mjs holds an HTML template with the
  # card's headline, tag line, brand wordmark, and domain hard-coded as strings,
  # and renders that template to the PNG. Those strings duplicate the site's own
  # copy, which is single-sourced elsewhere: the hero headline in
  # site/src/components/Hero.astro, the default title/og:title in
  # site/src/layouts/Base.astro, and the footer tag line and domain in
  # site/src/components/Footer.astro. When the site's copy changes but the
  # generator template does not, the card advertises a headline the site no longer
  # uses; when the template changes but the rendered PNG is not regenerated, the
  # committed image drifts from the template it claims to come from. A gate,
  # because a stale social card is a real, user-visible regression and the fix
  # (edit the template, or rerun `node scripts/og-gen.mjs`) is mechanical.
  - name: og-card-in-sync
    trigger:
      [
        site/scripts/og-gen.mjs,
        site/public/og.png,
        site/src/components/Hero.astro,
        site/src/layouts/Base.astro,
        site/src/components/Footer.astro,
      ]
    mode: gate
    backend: codex
    prompt: |
      The Open Graph card at site/public/og.png is the social-preview image for
      bastion.jessica.black. It is generated, not hand-drawn: site/scripts/og-gen.mjs
      holds an HTML template whose headline (its `<h1>`), tag line (its `.tag`), and
      footer domain are hard-coded strings, rendered to the PNG by `node
      scripts/og-gen.mjs`. Those strings restate copy the site already owns
      elsewhere: the hero headline in site/src/components/Hero.astro, the default
      `<title>` / og:title in site/src/layouts/Base.astro, and the footer tag line
      and domain in site/src/components/Footer.astro. You are running in the
      repository, so read the generator template and the site source directly.

      This is a gate. Block the PR if either of the following is definitely true
      after this change; otherwise approve it. When you cannot confirm a problem,
      approve.

      - CONTRADICTION: this change edits the site copy the card mirrors (the hero
        headline in Hero.astro, the default title / og:title in Base.astro, or the
        footer tag line or domain in Footer.astro) so that the matching hard-coded
        string in site/scripts/og-gen.mjs (its `<h1>`, its `.tag`, or its footer
        domain) now states something the site no longer says, and the generator
        template was not updated to match.
      - STALE RENDER: this change edits a hard-coded copy string in
        site/scripts/og-gen.mjs (the `<h1>`, the `.tag`, or the footer text) but the
        changeset does not also modify site/public/og.png, so the committed image
        cannot reflect the edited template. Rerunning `node scripts/og-gen.mjs` to
        regenerate the PNG is the fix.

      Judge only whether the card's text is in sync with the site's copy. The card
      need not reproduce the headline word for word: a deliberately shorter card
      line that still states the same thing the site states is fine, so block only
      on a real contradiction of fact, not a wording or emphasis difference. Styling,
      layout, color, font, or grid-background changes to either file, and edits to
      site copy the card does not mirror, are not violations, so approve them. When
      you block, name the file and string that drifted and the generator string that
      must change.

  # Unprovisioned capability opt-ins. A reviewer's execution profile must not opt
  # into an execution tier this build cannot provision. The schema models `mcp` and
  # `skills` capabilities this build does not yet honor, but a reviewer that declares
  # one would run degraded: a gate relying on a tool it never received is a fail-open
  # hole. Bastion fails such a reviewer closed at run time (`ExecutionPlan::resolve`
  # in src/backend/container/plan.rs); this gate catches it earlier, at authoring time,
  # with a clearer message than a reviewer that simply blocks itself. The container
  # `runner` is now provisioned, and `network` is honored inside a container; widen
  # the provisioned set in this prompt as each remaining tier lands. The
  # honored-fields table in docs/developer-guide/backends.md is the source of truth.
  - name: unprovisioned-capabilities
    trigger: [.bastion.yaml, .bastion.yml]
    mode: gate
    backend: codex
    prompt: |
      Review changes to the reviewer registry (.bastion.yaml) for
      unprovisioned capability opt-ins. No reviewer may opt into an execution tier
      this build does not yet provision. You are running in the repository, so read
      the changed registry directly.

      This build provisions these fields: name, trigger, mode, prompt, backend
      (claude-code and codex; `any` maps to claude-code; `pi` fails closed),
      timeout, inputs, env, and the container `runner` block (a `dockerfile` or an
      `image`). A reviewer with a `runner` runs its backend inside that container.
      It does NOT yet provision the `mcp` or `skills` capability opt-ins, and it does
      not scope network egress.

      This is a gate. Block the PR if any reviewer entry, after this change,
      declares one of the following; otherwise approve it.

      - `capabilities.network: true` on a reviewer that has NO `runner` block:
        network can only be honored inside a container, so a native reviewer cannot
        get it. `network: true` together with a `runner` block is fine (the
        container has network). The default `network: false` (or omitting it) is
        always fine.
      - A non-empty `capabilities.mcp` list: MCP servers are not provisioned.
      - A non-empty `capabilities.skills` list: skills are not loaded into the
        agent's context.

      When you block, name the reviewer and the exact field, and say it declares a
      capability this build does not yet provision. Judge only unprovisioned
      capability opt-ins. A reviewer that stays within the provisioned set above is
      fine (including a `runner` block, with or without `network: true`), and
      ordinary prompt, trigger, mode, or backend edits are not violations, so approve
      them.
